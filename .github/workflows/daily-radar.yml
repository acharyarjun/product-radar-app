name: Daily Product Radar

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: product-radar-daily
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run radar
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_ENABLED: ${{ vars.NOTION_ENABLED }}
          ALIEXPRESS_AFFILIATE_KEY: ${{ secrets.ALIEXPRESS_AFFILIATE_KEY }}
          RADAR_GIT_AUTO_COMMIT: "false"
          RADAR_GIT_AUTO_PUSH: "false"
        run: python -m src.main

      - name: Commit reports and memory
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "radar: daily run ${{ github.run_id }}"
          file_pattern: "reports/*.md reports/*.csv memory.json"