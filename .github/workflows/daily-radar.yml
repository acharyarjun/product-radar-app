# Daily market research + optional commit of reports (default branch only for schedule).
# Manual run: Actions → "Daily Product Radar" → Run workflow

name: Daily Product Radar

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/daily-radar.yml"
      - "src/**"
      - "pyproject.toml"
      - "config.yaml"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: product-radar-daily
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run Product Radar
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_ENABLED: ${{ vars.NOTION_ENABLED }}
          ALIEXPRESS_AFFILIATE_KEY: ${{ secrets.ALIEXPRESS_AFFILIATE_KEY }}
          RADAR_GIT_AUTO_COMMIT: "false"
          RADAR_GIT_AUTO_PUSH: "false"
        run: python -m src.main

      - name: Commit reports and memory
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "radar: daily run ${{ github.run_id }}"
          file_pattern: "reports/*.md reports/*.csv memory.json"
