radar:
  max_source_price_eur: 100.00
  min_profit_margin: 0.50
  min_demand_score: 5
  target_market: "Spain"
  target_city: "Bilbao"
  currency: "EUR"
  max_products_per_run: 50
  categories:
    - electronics
    - home_garden
    - kitchen
    - sports_outdoor
    - beauty_health
    - tools
    - pet_supplies

sources:
  aliexpress:
    enabled: true
    base_url: "https://www.aliexpress.com"
    sort_by: "orders"
  temu:
    enabled: false
    base_url: "https://www.temu.com"
  google_trends:
    enabled: true
    region: "ES"
    timeframe: "today 3-m"

competition:
  amazon_es:
    enabled: true
    base_url: "https://www.amazon.es"
  google_shopping:
    enabled: false

notion:
  enabled: false
  database_id: ""
  register_marginal: false
  notion_version: "2022-06-28"
  digest_parent_page_id: ""
  digest_page_title_property: "title"
  property_names:
    title: "Name"
    source: "Source"
    source_url: "Source URL"
    source_price_eur: "Source price EUR"
    recommended_sale_eur: "Recommended sale EUR"
    margin_pct: "Margin pct"
    demand: "Demand"
    competition: "Competition"
    viability: "Viability"
    category: "Category"
    run_date: "Run date"
    notes: "Notes"
    pipeline_status: "Pipeline status"
    target: "Target"

schedule:
  daily_run_time: "08:00"
  timezone: "Europe/Madrid"

git:
  auto_commit: true
  auto_push: false
  commit_prefix: "radar"

logging:
  level: "INFO"
  file: "logs/radar.log"

storage:
  sqlite_path: "data/radar.db"